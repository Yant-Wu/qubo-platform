# 給對方使用的 compose 檔（直接 pull image，不需要原始碼）
# 使用方式：
#   docker compose -f docker-compose.release.yml up -d
#
# Docker Hub 帳號：yantwu

services:

  backend:
    image: yantwu/qubo-backend:gpu-latest
    expose:
      - "8000"
    environment:
      CORS_ORIGINS: "*"
      HOST: 0.0.0.0
      PORT: "8000"
      RELOAD: "false"
      WORKER_ENABLED: "true"
      WORKER_CHECK_INTERVAL: "2"
      DATABASE_URL: "sqlite:////data/qubo.db"
      # 有安裝 nvidia-container-runtime 的機器會自動啟用 GPU
      # 沒有 GPU 的機器此變數被忽略，solver 自動 fallback CPU
      NVIDIA_VISIBLE_DEVICES: all
    volumes:
      - qubo_data:/data
    networks:
      - qubo_net
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "/app/.venv/bin/python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    image: yantwu/qubo-frontend:latest
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - qubo_net
    restart: unless-stopped

networks:
  qubo_net:
    driver: bridge

volumes:
  qubo_data:
    driver: local
