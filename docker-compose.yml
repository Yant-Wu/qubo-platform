# 發布用 Compose 清單：直接拉取已發布的映像，不需要原始碼建置。
# 使用方式：docker compose up -d

services:

  backend:
    image: yantwu/qubo-backend:gpu-latest
    expose:
      - "8000"
    environment:
      CORS_ORIGINS: "*"
      HOST: 0.0.0.0
      PORT: "8000"
      RELOAD: "false"
      WORKER_ENABLED: "true"
      WORKER_CHECK_INTERVAL: "2"
      DATABASE_URL: "sqlite:////data/qubo.db"
      # 此 GPU 映像需要 NVIDIA Container Toolkit 與可用的 NVIDIA GPU。
      NVIDIA_VISIBLE_DEVICES: all
    volumes:
      - qubo_data:/data
    networks:
      - qubo_net
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "/app/.venv/bin/python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    image: yantwu/qubo-frontend:latest
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - qubo_net
    restart: unless-stopped

networks:
  qubo_net:
    driver: bridge

volumes:
  qubo_data:
    driver: local
